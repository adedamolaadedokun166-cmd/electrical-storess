services:
  - type: web
    name: ade-and-ade-electricals
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        value: ade-ade-electricals-secret
      - key: DATABASE_PATH
        value: database.db
