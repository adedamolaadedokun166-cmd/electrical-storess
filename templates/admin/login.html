<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Ade & Ade Electricals</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    body { font-family: Inter, sans-serif; background: #07111f; color: #f8fafc; min-height: 100vh; display: grid; place-items: center; }
    .panel { width: min(92vw, 460px); background: #111c2f; padding: 2rem; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .panel h1 { margin-bottom: .5rem; }
    .panel form { display: grid; gap: 1rem; margin-top: 1rem; }
    .panel input, .panel button { padding: .8rem 1rem; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff; }
    .panel button { background: #f59e0b; color: #07111f; cursor: pointer; font-weight: 700; }
    .message { margin-top: 1rem; color: #fca5a5; }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Admin Login</h1>
    <p>Access the management dashboard.</p>
    <form method="post">
      <input type="text" name="username" placeholder="Username" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
    {% if error %}<div class="message">{{ error }}</div>{% endif %}
  </div>
</body>
</html>
